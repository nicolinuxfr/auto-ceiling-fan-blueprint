blueprint:
  name: "[[blueprint.name]] ([[blueprint.version]])"
  description: |-
    [[blueprint.description]]

    [[blueprint.version.line]] — [Changelog](https://github.com/nicolinuxfr/auto-ceiling-fan-blueprint/blob/main/CHANGELOG.md#[[blueprint.version.nodots]])
  domain: automation
  homeassistant:
    min_version: 2024.6.0
  input:
    fan_entities:
      name: [[input.fan_entities.name]]
      description: [[input.fan_entities.description]]
      selector:
        entity:
          multiple: true
          filter:
            - domain: fan

    temp_sensors:
      name: [[input.temp_sensors.name]]
      description: [[input.temp_sensors.description]]
      selector:
        entity:
          multiple: true
          filter:
            - domain: sensor
              device_class: temperature

    direction_section:
      name: [[input.direction_section.name]]
      icon: mdi:rotate-3d-variant
      collapsed: true
      input:
        climate_entity:
          name: [[input.climate_entity.name]]
          description: [[input.climate_entity.description]]
          default: ""
          selector:
            entity:
              filter:
                - domain: climate

    threshold_settings:
      name: [[input.threshold_settings.name]]
      icon: mdi:tune
      collapsed: true
      input:
        threshold_off:
          name: [[input.threshold_off.name]]
          description: [[input.threshold_off.description]]
          default: 1.0
          selector:
            number:
              min: 0.0
              max: 5.0
              step: 0.5
              mode: box
              unit_of_measurement: "°C"

        threshold_normal:
          name: [[input.threshold_normal.name]]
          description: [[input.threshold_normal.description]]
          default: 2.0
          selector:
            number:
              min: 0.0
              max: 10.0
              step: 0.5
              mode: box
              unit_of_measurement: "°C"

        threshold_fast:
          name: [[input.threshold_fast.name]]
          description: [[input.threshold_fast.description]]
          default: 4.0
          selector:
            number:
              min: 0.0
              max: 15.0
              step: 0.5
              mode: box
              unit_of_measurement: "°C"

    speed_settings:
      name: [[input.speed_settings.name]]
      icon: mdi:fan
      collapsed: true
      input:
        speed_normal:
          name: [[input.speed_normal.name]]
          description: [[input.speed_normal.description]]
          default: 33
          selector:
            number:
              min: 1
              max: 100
              step: 1
              mode: slider
              unit_of_measurement: "%"

        speed_fast:
          name: [[input.speed_fast.name]]
          description: [[input.speed_fast.description]]
          default: 67
          selector:
            number:
              min: 1
              max: 100
              step: 1
              mode: slider
              unit_of_measurement: "%"

    silent_mode_section:
      name: [[input.silent_mode_section.name]]
      icon: mdi:volume-off
      collapsed: true
      input:
        silent_mode_entity:
          name: [[input.silent_mode_entity.name]]
          description: [[input.silent_mode_entity.description]]
          default: ""
          selector:
            entity:
              filter:
                - domain: input_boolean
                - domain: binary_sensor

    eval_interval:
      name: [[input.eval_interval.name]]
      description: [[input.eval_interval.description]]
      default: 15
      selector:
        number:
          min: 1
          max: 1440
          step: 1
          mode: box
          unit_of_measurement: "min"

mode: restart

variables:
  fan_entity_ids: !input fan_entities
  climate_id: !input climate_entity
  temp_sensors_ids: !input temp_sensors
  silent_entity_id: !input silent_mode_entity
  thr_off: !input threshold_off
  thr_normal: !input threshold_normal
  thr_fast: !input threshold_fast
  spd_normal: !input speed_normal
  spd_fast: !input speed_fast

  temp_delta: >
    {% set temps = expand(temp_sensors_ids)
       | map(attribute='state')
       | map('float', none)
       | reject('eq', none)
       | list %}
    {% if temps | count >= 2 %}
      {{ (temps | max - temps | min) | round(2) }}
    {% else %}
      {{ 0 }}
    {% endif %}

  is_heating_mode: >
    {% if climate_id not in ['', none] %}
      {{ states(climate_id) == 'heat' }}
    {% else %}
      {% set lat = state_attr('zone.home', 'latitude') | float(48) %}
      {% set winter_months = [11, 12, 1, 2, 3] if lat >= 0 else [5, 6, 7, 8, 9] %}
      {{ now().month in winter_months }}
    {% endif %}

  fan_direction: "{{ 'reverse' if is_heating_mode else 'forward' }}"

  silent_active: >
    {{ silent_entity_id not in ['', none] and is_state(silent_entity_id, 'on') }}

  fan_targets: >
    {{ expand(fan_entity_ids) | map(attribute='entity_id') | list }}

  fan_direction_targets: >
    {% set ns = namespace(targets=[]) %}
    {% for fan in expand(fan_entity_ids) %}
      {% if fan.attributes.supported_features is defined
            and fan.attributes.supported_features | bitwise_and(4) %}
        {% set ns.targets = ns.targets + [fan.entity_id] %}
      {% endif %}
    {% endfor %}
    {{ ns.targets }}

  any_fan_on: >
    {{ expand(fan_entity_ids) | selectattr('state', 'eq', 'on') | list | count > 0 }}

  delta_available: >
    {{ temp_delta not in [none, 'none', 'unknown', 'unavailable', ''] }}

trigger_variables:
  eval_interval_val: !input eval_interval

trigger:
  - trigger: homeassistant
    alias: "[[trigger.ha_start.alias]]"
    event: start
    id: ha_start

  - trigger: event
    alias: "[[trigger.automations_reload.alias]]"
    event_type: call_service
    event_data:
      domain: automation
      service: reload
    id: automations_reload

  - trigger: event
    alias: "[[trigger.silent_mode.alias]]"
    event_type: state_changed
    event_data:
      entity_id: !input silent_mode_entity
    id: silent_changed

  - trigger: template
    alias: "[[trigger.tick.alias]]"
    value_template: >
      {% set interval = eval_interval_val | int(10) %}
      {% set total_minutes = now().hour * 60 + now().minute %}
      {{ total_minutes % interval == 0 }}
    id: tick

condition:
  - condition: template
    alias: "[[condition.delta_available.alias]]"
    value_template: "{{ delta_available }}"

action:
  - variables:
      fans_needing_direction: >
        {% set ns = namespace(targets=[]) %}
        {% for fan_id in fan_direction_targets %}
          {% if state_attr(fan_id, 'direction') != fan_direction | trim %}
            {% set ns.targets = ns.targets + [fan_id] %}
          {% endif %}
        {% endfor %}
        {{ ns.targets }}

  - if:
      - condition: template
        value_template: "{{ fans_needing_direction | count > 0 }}"
    then:
      - action: fan.set_direction
        target:
          entity_id: "{{ fans_needing_direction }}"
        data:
          direction: "{{ fan_direction | trim }}"

  - choose:
      - conditions:
          - condition: template
            value_template: >
              {{ silent_active
                 and (temp_delta | float(0)) < (thr_fast | float(4.0)) }}
        sequence:
          - if:
              - condition: template
                value_template: "{{ any_fan_on }}"
            then:
              - action: fan.turn_off
                target:
                  entity_id: "{{ fan_targets }}"

      - conditions:
          - condition: template
            value_template: >
              {{ silent_active
                 and (temp_delta | float(0)) >= (thr_fast | float(4.0)) }}
        sequence:
          - variables:
              fans_needing_on: >
                {% set target_pct = spd_normal | int(33) %}
                {% set ns = namespace(targets=[]) %}
                {% for fan_id in fan_targets %}
                  {% if states(fan_id) != 'on'
                     or state_attr(fan_id, 'percentage') | int(0) != target_pct %}
                    {% set ns.targets = ns.targets + [fan_id] %}
                  {% endif %}
                {% endfor %}
                {{ ns.targets }}
          - if:
              - condition: template
                value_template: "{{ fans_needing_on | count > 0 }}"
            then:
              - action: fan.turn_on
                target:
                  entity_id: "{{ fans_needing_on }}"
                data:
                  percentage: "{{ spd_normal | int(33) }}"

      - conditions:
          - condition: template
            value_template: "{{ (temp_delta | float(0)) < (thr_off | float(1.0)) }}"
        sequence:
          - if:
              - condition: template
                value_template: "{{ any_fan_on }}"
            then:
              - action: fan.turn_off
                target:
                  entity_id: "{{ fan_targets }}"

      - conditions:
          - condition: template
            value_template: "{{ (temp_delta | float(0)) >= (thr_fast | float(4.0)) }}"
        sequence:
          - variables:
              fans_needing_on: >
                {% set target_pct = spd_fast | int(67) %}
                {% set ns = namespace(targets=[]) %}
                {% for fan_id in fan_targets %}
                  {% if states(fan_id) != 'on'
                     or state_attr(fan_id, 'percentage') | int(0) != target_pct %}
                    {% set ns.targets = ns.targets + [fan_id] %}
                  {% endif %}
                {% endfor %}
                {{ ns.targets }}
          - if:
              - condition: template
                value_template: "{{ fans_needing_on | count > 0 }}"
            then:
              - action: fan.turn_on
                target:
                  entity_id: "{{ fans_needing_on }}"
                data:
                  percentage: "{{ spd_fast | int(67) }}"

      - conditions:
          - condition: template
            value_template: "{{ (temp_delta | float(0)) >= (thr_normal | float(2.0)) }}"
        sequence:
          - variables:
              fans_needing_on: >
                {% set target_pct = spd_normal | int(33) %}
                {% set ns = namespace(targets=[]) %}
                {% for fan_id in fan_targets %}
                  {% if states(fan_id) != 'on'
                     or state_attr(fan_id, 'percentage') | int(0) != target_pct %}
                    {% set ns.targets = ns.targets + [fan_id] %}
                  {% endif %}
                {% endfor %}
                {{ ns.targets }}
          - if:
              - condition: template
                value_template: "{{ fans_needing_on | count > 0 }}"
            then:
              - action: fan.turn_on
                target:
                  entity_id: "{{ fans_needing_on }}"
                data:
                  percentage: "{{ spd_normal | int(33) }}"

      - conditions:
          - condition: template
            value_template: >
              {{ (temp_delta | float(0)) >= (thr_off | float(1.0))
                 and (temp_delta | float(0)) < (thr_normal | float(2.0))
                 and any_fan_on }}
        sequence:
          - variables:
              fans_needing_pct: >
                {% set target_pct = spd_normal | int(33) %}
                {% set ns = namespace(targets=[]) %}
                {% for fan_id in fan_targets %}
                  {% if state_attr(fan_id, 'percentage') | int(0) != target_pct %}
                    {% set ns.targets = ns.targets + [fan_id] %}
                  {% endif %}
                {% endfor %}
                {{ ns.targets }}
          - if:
              - condition: template
                value_template: "{{ fans_needing_pct | count > 0 }}"
            then:
              - action: fan.set_percentage
                target:
                  entity_id: "{{ fans_needing_pct }}"
                data:
                  percentage: "{{ spd_normal | int(33) }}"

    default: []
